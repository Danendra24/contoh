<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-DASH Universal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #6366f1; color: white; }
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        code { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-300">

    <div id="modal-item" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-indigo-400">Add New Widget</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Item Name</label>
                    <input id="item-name" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500" placeholder="e.g. Temperature">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Type</label>
                    <select id="item-type" onchange="window.toggleMinMax()" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none">
                        <option value="switch">Digital Switch</option>
                        <option value="status">Status Indicator</option>
                        <option value="numeric_gauge">Numeric Gauge (Full Circle)</option>
                        <option value="numeric_simple">Numeric Simple Text</option>
                    </option>
                    </select>
                </div>
                <div id="min-max-container" class="hidden grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Min Value</label>
                        <input id="item-min" type="number" value="0" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Max Value</label>
                        <input id="item-max" type="number" value="100" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none">
                    </div>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="window.closeModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 font-semibold">Cancel</button>
                <button onclick="window.saveItem()" class="flex-1 px-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold">Save Widget</button>
            </div>
        </div>
    </div>

    <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col">
        <div class="p-8 text-2xl font-black tracking-tighter text-indigo-500 italic">UNI-DASH</div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="window.switchTab('editor')" id="btn-editor" class="sidebar-item active w-full flex items-center p-4 rounded-xl text-sm font-medium transition">
                <i class="fas fa-tools w-6"></i><span class="ml-3">Dashboard Editor</span>
            </button>
            <button onclick="window.switchTab('monitor')" id="btn-monitor" class="sidebar-item w-full flex items-center p-4 rounded-xl text-slate-500 text-sm font-medium transition">
                <i class="fas fa-chart-line w-6"></i><span class="ml-3">Display & Control</span>
            </button>
            <button onclick="window.switchTab('connection')" id="btn-connection" class="sidebar-item w-full flex items-center p-4 rounded-xl text-slate-500 border-t border-slate-800/50 mt-4 pt-6 text-sm font-medium transition">
                <i class="fas fa-network-wired w-6"></i><span class="ml-3">System Connection</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="h-20 border-b border-slate-800 flex items-center justify-between px-10 glass sticky top-0 z-10">
            <h2 id="header-title" class="text-xs uppercase tracking-widest font-black text-slate-400">Dashboard Editor</h2>
            <button onclick="window.openModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest shadow-lg">
                <i class="fas fa-plus mr-2"></i> Create Widget
            </button>
        </header>

        <div class="p-10">
            <div id="section-editor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="section-monitor" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <div id="section-connection" class="hidden max-w-3xl mx-auto space-y-8">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                   <h3 class="text-lg font-bold text-white mb-4 italic">Firebase Connection Recap</h3>
                   <code class="block bg-black p-4 rounded text-emerald-400 text-[10px] mb-6 overflow-x-auto">Host: https://dashboardiot-7fd60-default-rtdb.asia-southeast1.firebasedatabase.app/</code>
                   <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] text-slate-500 uppercase tracking-widest border-b border-slate-800">
                                <tr><th class="py-3">Widget Name</th><th class="py-3">Range</th><th class="py-3">Firebase Path ID</th></tr>
                            </thead>
                            <tbody id="recap-table-body" class="text-[11px]"></tbody>
                        </table>
                   </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDri3OmQNtdmZNb2fR9cu4KhFEA4kn29M",
            authDomain: "dashboardiot-7fd60.firebaseapp.com",
            projectId: "dashboardiot-7fd60",
            storageBucket: "dashboardiot-7fd60.firebasestorage.app",
            messagingSenderId: "443856198994",
            appId: "1:443856198994:web:77234918f9f9f79ecae8b",
            databaseURL: "https://dashboardiot-7fd60-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const widgetsRef = ref(db, 'system_widgets');

        let localWidgets = [];

        window.toggleMinMax = () => {
            const type = document.getElementById('item-type').value;
            document.getElementById('min-max-container').style.display = (type === 'numeric_gauge') ? 'grid' : 'none';
        };

        window.openModal = () => document.getElementById('modal-item').classList.remove('hidden');
        window.closeModal = () => {
            document.getElementById('modal-item').classList.add('hidden');
            document.getElementById('min-max-container').style.display = 'none';
        };
        
        window.saveItem = () => {
            const name = document.getElementById('item-name').value;
            const type = document.getElementById('item-type').value;
            const min = parseFloat(document.getElementById('item-min').value) || 0;
            const max = parseFloat(document.getElementById('item-max').value) || 100;

            if(!name) return alert("Isi nama dulu!");
            const id = Date.now();
            const newWidget = { id, name, type, min, max, slug: name.toLowerCase().replace(/\s+/g, '_') + '_' + Math.floor(Math.random()*1000) };
            set(ref(db, 'system_widgets/' + id), newWidget);
            window.closeModal();
            document.getElementById('item-name').value = '';
        };

        window.deleteWidget = (id) => {
            if(confirm("Hapus widget?")) remove(ref(db, 'system_widgets/' + id));
        };

        window.switchTab = (tab) => {
            ['editor', 'monitor', 'connection'].forEach(s => document.getElementById('section-'+s).classList.add('hidden'));
            ['editor', 'monitor', 'connection'].forEach(b => document.getElementById('btn-'+b).classList.remove('active', 'text-white'));
            document.getElementById('section-'+tab).classList.remove('hidden');
            document.getElementById('btn-'+tab).classList.add('active', 'text-white');
            document.getElementById('header-title').innerText = tab.toUpperCase();
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert("Path Copied!");
        };

        onValue(widgetsRef, (snapshot) => {
            localWidgets = snapshot.val() ? Object.values(snapshot.val()) : [];
            renderUI();
        });

        function createMonitorComponent(w) {
            let content = '';
            if(w.type === 'switch') {
                content = `<div class="mt-5 flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                            <span class="text-[10px] font-bold text-slate-500">Status</span>
                            <div class="w-10 h-5 bg-slate-700 rounded-full relative p-1 cursor-not-allowed"><div class="w-3 h-3 bg-white rounded-full"></div></div>
                           </div>`;
            } else if (w.type === 'numeric_gauge') {
                // Fix Offset: 251.2 adalah keliling penuh (0%). 
                // Karena data sekarang 0, kita set offset ke 251.2
                content = `
                <div class="mt-4 flex flex-col items-center justify-center relative h-32 w-full">
                    <svg class="w-24 h-24 transform -rotate-90">
                        <circle cx="48" cy="48" r="40" stroke="currentColor" stroke-width="6" fill="transparent" class="text-slate-800" />
                        <circle cx="48" cy="48" r="40" stroke="currentColor" stroke-width="7" fill="transparent" 
                                stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" class="text-indigo-500 transition-all duration-1000" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-xl font-black text-white leading-none">0</span>
                        <span class="text-[7px] font-bold text-slate-500 uppercase mt-1">${w.min} - ${w.max}</span>
                    </div>
                </div>`;
            } else {
                content = `<div class="mt-3 text-3xl font-black text-white">0</div>`;
            }

            return `<div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl">
                        <div class="text-[9px] text-slate-600 uppercase font-black mb-1">${w.type}</div>
                        <div class="text-sm font-bold text-slate-200 truncate">${w.name}</div>
                        ${content}
                    </div>`;
        }

        function renderUI() {
            const editor = document.getElementById('section-editor');
            const monitor = document.getElementById('section-monitor');
            const recap = document.getElementById('recap-table-body');
            editor.innerHTML = ''; monitor.innerHTML = ''; recap.innerHTML = '';

            localWidgets.forEach(w => {
                const path = `/data/${w.slug}`;
                editor.innerHTML += `
                    <div class="bg-slate-800/30 border border-slate-700/50 p-6 rounded-2xl shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <div><div class="text-[9px] text-indigo-400 font-bold uppercase mb-1">${w.type}</div><div class="font-bold text-white">${w.name}</div></div>
                            <button onclick="window.deleteWidget(${w.id})" class="text-slate-600 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                            <code class="text-[10px] text-emerald-500 truncate">${path}</code>
                            <button onclick="window.copyToClipboard('${path}')" class="text-slate-700 hover:text-white"><i class="far fa-copy text-xs"></i></button>
                        </div>
                    </div>`;
                monitor.innerHTML += createMonitorComponent(w);
                recap.innerHTML += `<tr class="border-t border-slate-800"><td class="py-4 text-slate-300 font-bold">${w.name}</td><td class="py-4 text-slate-500 uppercase text-[9px] font-bold">${w.min}-${w.max}</td><td class="py-4 text-emerald-500 font-mono font-bold">${path}</td></tr>`;
            });
        }
    </script>
</body>
</html>
