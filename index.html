<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-DASH Universal System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #6366f1; color: white; }
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        code { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .project-card.active { border-color: #6366f1; background: #1e293b; }
        .input-locked { background: #020617 !important; color: #10b981 !important; border-color: #1e293b !important; cursor: default; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-300">

    <div id="modal-item" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <h3 id="widget-modal-title" class="text-xl font-bold mb-6 text-indigo-400">Add New Widget</h3>
            <input type="hidden" id="edit-widget-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Item Name</label>
                    <input id="item-name" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 transition" placeholder="e.g. Pump Switch / Temp Sensor">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Category & Type</label>
                    <select id="item-type" onchange="toggleMinMax()" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-indigo-500 cursor-pointer">
                        <optgroup label="Control (Output to ESP32)" class="bg-slate-900">
                            <option value="switch">Digital Switch (ON/OFF)</option>
                            <option value="button">Push Button (Trigger)</option>
                        </optgroup>
                        <optgroup label="Monitor (Input from ESP32)" class="bg-slate-900">
                            <option value="status">Status Indicator (0 / 1)</option>
                            <option value="numeric_gauge">Numeric Gauge (Circle)</option>
                            <option value="numeric_simple">Numeric Simple Text</option>
                        </optgroup>
                    </select>
                </div>
                <div id="min-max-container" class="hidden grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Min Value</label>
                        <input id="item-min" type="number" value="0" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Max Value</label>
                        <input id="item-max" type="number" value="100" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none">
                    </div>
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 font-semibold transition">Cancel</button>
                <button onclick="saveItem()" class="flex-1 px-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold transition">Save Widget</button>
            </div>
        </div>
    </div>

    <div id="modal-project" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/90 p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm p-8 rounded-2xl shadow-2xl">
            <h3 id="project-modal-title" class="text-xl font-bold mb-6 text-emerald-400">Create New Project</h3>
            <input type="hidden" id="edit-project-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-2">Project Name</label>
                    <input id="project-name-input" type="text" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none" placeholder="e.g. Smart Home / Photobooth">
                </div>
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="closeProjectModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 text-sm font-semibold">Cancel</button>
                <button id="btn-save-project" onclick="saveProject()" class="flex-1 px-4 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold transition">Create</button>
            </div>
        </div>
    </div>

    <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col">
        <div class="p-8 text-2xl font-black tracking-tighter text-indigo-500 italic">DANENDRA DB IOT</div>
        
        <div class="px-6 mb-6">
            <label class="text-[9px] uppercase font-black text-slate-600 tracking-[0.2em] mb-3 block">Selected Project</label>
            <div id="project-list" class="space-y-2 max-h-40 overflow-y-auto mb-4"></div>
            <button onclick="openProjectModal()" class="w-full py-2 border border-dashed border-slate-700 rounded-xl text-[10px] font-bold text-slate-500 hover:text-emerald-400 hover:border-emerald-500/50 transition">
                <i class="fas fa-folder-plus mr-2"></i>New Project
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('editor')" id="btn-editor" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition text-sm font-medium">
                <i class="fas fa-tools w-6"></i><span class="ml-3">Dashboard Editor</span>
            </button>
            <button onclick="switchTab('monitor')" id="btn-monitor" class="sidebar-item w-full flex items-center p-4 rounded-xl transition text-slate-500 text-sm font-medium">
                <i class="fas fa-chart-line w-6"></i><span class="ml-3">Display & Control</span>
            </button>
            <button onclick="switchTab('connection')" id="btn-connection" class="sidebar-item w-full flex items-center p-4 rounded-xl transition text-slate-500 border-t border-slate-800/50 mt-4 pt-6 text-sm font-medium">
                <i class="fas fa-network-wired w-6"></i><span class="ml-3">System Connection</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-900 text-[10px] text-slate-600 font-mono text-center uppercase tracking-widest">
            developed by danendraproject
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto relative">
        <header class="h-20 border-b border-slate-800 flex items-center justify-between px-10 glass sticky top-0 z-10">
            <div class="flex flex-col">
                <h2 id="header-title" class="text-xs uppercase tracking-[0.2em] font-black text-slate-400">Dashboard Editor</h2>
                <div id="active-project-name" class="text-[10px] text-indigo-500 font-bold uppercase mt-1">No Project Selected</div>
            </div>
            <button id="btn-create-widget" onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-full text-[11px] font-black transition uppercase tracking-widest shadow-lg shadow-indigo-600/20 opacity-50 cursor-not-allowed" disabled>
                <i class="fas fa-plus mr-2"></i> Create Widget
            </button>
        </header>

        <div class="p-10">
            <div id="section-editor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="section-monitor" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            
            <div id="section-connection" class="hidden max-w-3xl mx-auto space-y-8">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                    <div class="bg-indigo-600 p-6 flex justify-between items-center">
                        <div>
                            <h3 class="text-lg font-bold text-white italic">ESP32 Credentials</h3>
                            <p class="text-indigo-200 text-[10px] uppercase tracking-wider font-bold">Firebase Configuration</p>
                        </div>
                        <button id="btn-unlock-config" onclick="unlockConfig()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-[10px] font-bold transition">
                            <i class="fas fa-lock mr-2"></i>UNLOCK EDIT
                        </button>
                    </div>
                    <div class="p-8 space-y-6">
                        <div>
                            <label class="text-[9px] uppercase text-slate-500 font-bold tracking-widest mb-2 block">Database Host URL</label>
                            <div class="flex items-center bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                                <input id="db-url-input" type="text" readonly value="https://dashboardiot-7fd60-default-rtdb.asia-southeast1.firebasedatabase.app/" class="input-locked flex-1 bg-transparent border-none text-xs font-mono italic px-3 focus:outline-none">
                                <button onclick="copyToClipboard(document.getElementById('db-url-input').value)" class="p-3 text-slate-500 hover:text-white transition"><i class="far fa-copy"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] uppercase text-slate-500 font-bold tracking-widest mb-2 block">API Key / Secret</label>
                            <div class="flex items-center bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                                <input id="db-key-input" type="text" readonly value="AIzaSyCDri3OmQNtdmZNb2fR9cu4KhFEA4kn29M" class="input-locked flex-1 bg-transparent border-none text-xs font-mono italic px-3 focus:outline-none">
                                <button onclick="copyToClipboard(document.getElementById('db-key-input').value)" class="p-3 text-slate-500 hover:text-white transition"><i class="far fa-copy"></i></button>
                            </div>
                        </div>
                        <div id="save-config-container" class="hidden pt-4 border-t border-slate-800 flex justify-end">
                             <button onclick="lockConfig(true)" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-2 rounded-xl text-[11px] font-black transition">SAVE & LOCK</button>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                    <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Daftar Rekap Path ID</h4>
                        <span id="widget-count" class="bg-slate-800 text-indigo-400 px-3 py-1 rounded-full text-[10px] font-bold">0 Widgets</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[10px] text-slate-500 uppercase tracking-widest bg-slate-950/30">
                                    <th class="px-6 py-4 font-black">Widget Name</th>
                                    <th class="px-6 py-4 font-black">Type</th>
                                    <th class="px-6 py-4 font-black text-emerald-500">Firebase Path ID</th>
                                </tr>
                            </thead>
                            <tbody id="recap-table-body" class="text-[11px]"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDri3OmQNtdmZNb2fR9cu4KhFEA4kn29M",
            databaseURL: "https://dashboardiot-7fd60-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.projects = [];
        window.activeProjectId = null;

        // LOAD PROJECTS (Real-time)
        onValue(ref(db, 'system_projects'), (snapshot) => {
            const data = snapshot.val();
            window.projects = data ? Object.values(data) : [];
            renderProjects();
            if(window.activeProjectId) renderAll();
        });

        // PROJECT LOGIC
        window.saveProject = () => {
            const name = document.getElementById('project-name-input').value;
            const editId = document.getElementById('edit-project-id').value;
            if(!name) return;
            
            if(editId) {
                update(ref(db, 'system_projects/' + editId), { name });
            } else {
                const id = Date.now();
                const slug = name.toLowerCase().replace(/[^a-z0-9]/g, "_");
                set(ref(db, 'system_projects/' + id), { id, name, slug, widgets: {} });
            }
            closeProjectModal();
        };

        window.deleteProject = (id) => {
            const p = window.projects.find(proj => proj.id == id);
            if(confirm(`Hapus project "${p.name}"? SEMUA widget di dalamnya akan ikut terhapus otomatis.`)) {
                // Hapus data fisik di node /data/[slug]
                remove(ref(db, `data/${p.slug}`));
                // Hapus node project (Otomatis menghapus node widgets di dalamnya)
                remove(ref(db, `system_projects/${id}`));
                if(window.activeProjectId == id) window.activeProjectId = null;
            }
        };

        window.selectProject = (id) => {
            window.activeProjectId = id;
            const proj = window.projects.find(p => p.id == id);
            document.getElementById('active-project-name').innerText = "Active: " + proj.name;
            const btn = document.getElementById('btn-create-widget');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            renderProjects();
            renderAll();
        };

        // WIDGET LOGIC (NESTED IN PROJECT)
        window.saveItem = () => {
            const name = document.getElementById('item-name').value;
            const type = document.getElementById('item-type').value;
            const min = parseFloat(document.getElementById('item-min').value) || 0;
            const max = parseFloat(document.getElementById('item-max').value) || 100;
            const editId = document.getElementById('edit-widget-id').value;
            
            if(!name || !window.activeProjectId) return;
            const proj = window.projects.find(p => p.id == window.activeProjectId);
            const id = editId || Date.now();
            const slug = editId ? proj.widgets[editId].slug : name.toLowerCase().replace(/[^a-z0-9]/g, "_") + "_" + Math.floor(1000 + Math.random() * 9000);

            const widgetData = { id, name, type, min, max, slug };
            
            // Simpan ke dalam node project
            set(ref(db, `system_projects/${window.activeProjectId}/widgets/${id}`), widgetData);
            
            if(!editId) set(ref(db, `data/${proj.slug}/${slug}`), 0);
            closeModal();
        };

        window.deleteWidget = (id) => {
            if(confirm("Hapus widget ini?")) {
                const proj = window.projects.find(p => p.id == window.activeProjectId);
                const w = proj.widgets[id];
                remove(ref(db, `data/${proj.slug}/${w.slug}`));
                remove(ref(db, `system_projects/${window.activeProjectId}/widgets/${id}`));
            }
        };

        // CONNECTION LOCK LOGIC
        window.unlockConfig = () => {
            const pin = prompt("Enter Security PIN:");
            if(pin === "5220711072") {
                document.getElementById('db-url-input').readOnly = false;
                document.getElementById('db-key-input').readOnly = false;
                document.getElementById('db-url-input').classList.remove('input-locked');
                document.getElementById('db-key-input').classList.remove('input-locked');
                document.getElementById('save-config-container').classList.remove('hidden');
                document.getElementById('btn-unlock-config').classList.add('hidden');
            } else {
                alert("Wrong PIN!");
            }
        };

        window.lockConfig = (isSave = false) => {
            document.getElementById('db-url-input').readOnly = true;
            document.getElementById('db-key-input').readOnly = true;
            document.getElementById('db-url-input').classList.add('input-locked');
            document.getElementById('db-key-input').classList.add('input-locked');
            document.getElementById('save-config-container').classList.add('hidden');
            document.getElementById('btn-unlock-config').classList.remove('hidden');
            if(isSave) alert("Configuration Saved & Locked.");
        };

        // RENDER UI
        window.renderAll = () => {
            const editorGrid = document.getElementById('section-editor');
            const monitorGrid = document.getElementById('section-monitor');
            const tableBody = document.getElementById('recap-table-body');
            editorGrid.innerHTML = ''; monitorGrid.innerHTML = ''; tableBody.innerHTML = '';

            const currentProj = window.projects.find(p => p.id == window.activeProjectId);
            if(!currentProj || !currentProj.widgets) {
                document.getElementById('widget-count').innerText = `0 Widgets`;
                return;
            }

            const list = Object.values(currentProj.widgets);
            document.getElementById('widget-count').innerText = `${list.length} Widgets`;

            list.forEach(w => {
                const fullPath = `/data/${currentProj.slug}/${w.slug}`;
                editorGrid.innerHTML += `
                    <div class="bg-slate-800/30 border border-slate-700/50 p-6 rounded-2xl space-y-4 shadow-lg group">
                        <div class="flex justify-between items-start">
                            <div><div class="text-[9px] text-indigo-400 font-bold uppercase mb-1">${w.type}</div><div class="font-bold text-white">${w.name}</div></div>
                            <div class="flex space-x-2">
                                <button onclick="openModal(${w.id})" class="text-slate-700 hover:text-emerald-400"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="deleteWidget(${w.id})" class="text-slate-700 hover:text-red-500"><i class="fas fa-trash-alt text-xs"></i></button>
                            </div>
                        </div>
                        <div class="bg-slate-950/80 rounded-xl p-4 border border-slate-800 flex justify-between items-center">
                             <code class="text-xs text-emerald-500 font-mono truncate">${fullPath}</code>
                             <button onclick="copyToClipboard('${fullPath}')" class="text-slate-600 hover:text-white"><i class="far fa-copy text-xs"></i></button>
                        </div>
                    </div>`;

                const cardId = `monitor-${w.id}`;
                monitorGrid.innerHTML += `<div id="${cardId}"></div>`;
                onValue(ref(db, fullPath), (snapshot) => {
                    const val = snapshot.val() || 0;
                    const container = document.getElementById(cardId);
                    if(container) container.innerHTML = createMonitorUI(w, val);
                });

                tableBody.innerHTML += `<tr class="border-t border-slate-800/50">
                    <td class="px-6 py-4 font-bold">${w.name}</td>
                    <td class="px-6 py-4 text-[9px] font-bold uppercase text-slate-500">${w.type}</td>
                    <td class="px-6 py-4"><code class="text-emerald-400">${fullPath}</code></td>
                </tr>`;
            });
        };

        // UI HELPERS (KEEP ORIGIN)
        function renderProjects() {
            const container = document.getElementById('project-list');
            container.innerHTML = '';
            window.projects.forEach(p => {
                const isActive = window.activeProjectId == p.id;
                container.innerHTML += `<div onclick="selectProject(${p.id})" class="group flex items-center justify-between p-3 rounded-xl border border-slate-800 cursor-pointer ${isActive ? 'bg-indigo-600/20 border-indigo-500' : 'hover:bg-slate-900'}">
                    <span class="text-[11px] font-bold truncate ${isActive ? 'text-white' : 'text-slate-400'}">${p.name}</span>
                    <div class="flex space-x-2 opacity-0 group-hover:opacity-100">
                        <button onclick="event.stopPropagation(); openProjectModal(${p.id})"><i class="fas fa-edit text-[10px] hover:text-emerald-500"></i></button>
                        <button onclick="event.stopPropagation(); deleteProject(${p.id})"><i class="fas fa-times text-[10px] hover:text-red-500"></i></button>
                    </div>
                </div>`;
            });
        }

        window.openProjectModal = (id = null) => {
            if(id) {
                const proj = window.projects.find(p => p.id == id);
                document.getElementById('edit-project-id').value = id;
                document.getElementById('project-name-input').value = proj.name;
            } else {
                document.getElementById('edit-project-id').value = '';
                document.getElementById('project-name-input').value = '';
            }
            document.getElementById('modal-project').classList.remove('hidden');
        };
        window.closeProjectModal = () => document.getElementById('modal-project').classList.add('hidden');
        window.openModal = (id = null) => {
            if(id) {
                const p = window.projects.find(proj => proj.id == window.activeProjectId);
                const w = p.widgets[id];
                document.getElementById('edit-widget-id').value = id;
                document.getElementById('item-name').value = w.name;
                document.getElementById('item-type').value = w.type;
                document.getElementById('item-min').value = w.min;
                document.getElementById('item-max').value = w.max;
            } else {
                document.getElementById('edit-widget-id').value = '';
                document.getElementById('item-name').value = '';
            }
            toggleMinMax();
            document.getElementById('modal-item').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal-item').classList.add('hidden');
        window.toggleMinMax = () => {
            const type = document.getElementById('item-type').value;
            document.getElementById('min-max-container').style.display = (type === 'numeric_gauge') ? 'grid' : 'none';
        };
        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 right-10 bg-emerald-600 text-white px-6 py-3 rounded-xl text-xs font-bold z-[100] animate-bounce";
            toast.innerText = "COPIED!";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        };
        window.switchTab = (tab) => {
            ['section-editor', 'section-monitor', 'section-connection'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById('header-title').innerText = tab.replace(/^\w/, c => c.toUpperCase());
        };
        window.toggleSwitch = (slug, cur) => {
            const p = window.projects.find(proj => proj.id == window.activeProjectId);
            set(ref(db, `data/${p.slug}/${slug}`), cur == 1 ? 0 : 1);
        };
        window.pushButton = (slug, v) => {
            const p = window.projects.find(proj => proj.id == window.activeProjectId);
            set(ref(db, `data/${p.slug}/${slug}`), v);
        };

        function createMonitorUI(w, val) {
            let inner = '';
            if(w.type === 'switch') {
                inner = `<div onclick="toggleSwitch('${w.slug}', ${val})" class="mt-5 flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 cursor-pointer">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">${val == 1 ? 'ON' : 'OFF'}</span>
                            <div class="w-10 h-5 ${val == 1 ? 'bg-indigo-600' : 'bg-slate-700'} rounded-full relative p-1"><div class="w-3 h-3 bg-white rounded-full transition-all transform ${val == 1 ? 'translate-x-5' : ''}"></div></div></div>`;
            } else if (w.type === 'numeric_gauge' || w.type === 'numeric_simple') {
                inner = `<div class="mt-4"><span class="text-3xl font-black text-white">${val}</span></div>`;
            } else if (w.type === 'status') {
                inner = `<div class="mt-4 flex items-center space-x-3 bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                         <div class="w-2.5 h-2.5 rounded-full ${val == 1 ? 'bg-emerald-500' : 'bg-slate-700'}"></div><span class="text-[10px] text-slate-500 uppercase">${val == 1 ? 'Active' : 'Inactive'}</span></div>`;
            } else if (w.type === 'button') {
                inner = `<button onmousedown="pushButton('${w.slug}', 1)" onmouseup="pushButton('${w.slug}', 0)" onmouseleave="pushButton('${w.slug}', 0)" class="w-full mt-4 py-3 bg-indigo-600/10 active:bg-indigo-600 text-indigo-400 active:text-white border border-indigo-600/20 rounded-xl text-[10px] font-black uppercase tracking-widest select-none">Trigger</button>`;
            }
            return `<div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
                        <div class="text-[9px] text-slate-600 uppercase font-black mb-1">${w.type}</div>
                        <div class="text-sm font-bold text-slate-200 truncate">${w.name}</div>
                        ${inner}
                    </div>`;
        }
    </script>
</body>
</html>
